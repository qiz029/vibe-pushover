name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: scripts/build-release.sh

      - name: Smoke-test installer
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          install_dir="$RUNNER_TEMP/vibe-pushover-install"
          VIBE_PUSHOVER_VERSION="$VERSION" \
          VIBE_PUSHOVER_INSTALL_DIR="$install_dir" \
          VIBE_PUSHOVER_DOWNLOAD_BASE_URL="file://$PWD/dist" \
          sh install.sh
          "$install_dir/vibe-pushover" --version | grep -F "vibe-pushover version $VERSION"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          dist/*
          --verify-tag
          --generate-notes
          --title "vibe-pushover ${{ github.ref_name }}"
